apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
        karpenter-test: "true"
      annotations:
        beta.karpenter.k8s.tke.kernel.arg/vm.max_map_count: "262144"
        beta.karpenter.k8s.tke.kernel.arg/net.core.somaxconn: "65535"
        beta.karpenter.k8s.tke.kernel.arg/fs.file-max: "1048576"
    spec:
      expireAfter: Never
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      nodeClassRef:
        group: karpenter.k8s.tke
        kind: TKEMachineNodeClass
        name: default
      taints:
        - key: karpenter-test
          value: "true"
          effect: NoSchedule
  limits:
    cpu: "10"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
